plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")

if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {

    namespace "com.choralia.romero"

    compileSdk flutter.compileSdkVersion
    ndkVersion "27.0.12077973"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    defaultConfig {

        applicationId "com.choralia.romero"

        minSdkVersion flutter.minSdkVersion
        targetSdk 34

        versionCode flutter.versionCode
        versionName flutter.versionName

        // Optimisation architecture CPU
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    signingConfigs {
        release {

            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']

            storeFile keystoreProperties['storeFile'] ?
                    file(keystoreProperties['storeFile']) : null

            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {

        release {

            if (keystoreProperties['storeFile'] != null) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }

            // Active optimisation code
            minifyEnabled true

            // Supprime ressources inutilisées
            shrinkResources true

            // Utilise Proguard pour optimisation
            proguardFiles getDefaultProguardFile(
                    'proguard-android-optimize.txt'
            ), 'proguard-rules.pro'

            // Evite crash si certaines libs ont des problèmes
            debuggable false
        }

        debug {
            debuggable true
        }
    }

    // Améliore performance build
    buildFeatures {
        buildConfig true
    }

    // Réduit taille META-INF
    packagingOptions {
        resources {
            excludes += [
                    "META-INF/LICENSE",
                    "META-INF/LICENSE.txt",
                    "META-INF/NOTICE",
                    "META-INF/NOTICE.txt"
            ]
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.3'
}
