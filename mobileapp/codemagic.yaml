workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.choralia.romero"
        XCODE_PROJECT: "Runner.xcodeproj"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Set up code signing
        script: | 
          # Cette étape sera gérée automatiquement si vous configurez 
          # "iOS code signing" dans l'UI de Codemagic
          keychain initialize
      - name: Get Flutter packages
        script: | 
          flutter packages pub get
      - name: Install pod dependencies
        script: | 
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: | 
          flutter build ipa --release \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --export-method ad-hoc # Ou app-store selon votre besoin
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - ${USER_EMAIL_PLACEHOLDER} # À remplacer ou configurer dans Codemagic
